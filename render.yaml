services:
  - type: web
    name: fifa-world-cup-2026-backend
    env: python
    plan: free
    region: oregon
    buildCommand: "cd webapp/backend && pip install -r requirements.txt"
    startCommand: "cd webapp/backend && gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
